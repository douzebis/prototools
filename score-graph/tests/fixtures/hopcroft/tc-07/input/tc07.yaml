entries:
  - Root1
  - Root2

# Root1 and Root2 have identical signatures (fields 1,2 both repeated MESSAGE).
# Root1.f1 â†’ TypeA, Root1.f2 â†’ TypeB
# Root2.f1 â†’ TypeC, Root2.f2 â†’ TypeD
#
# TypeA: f1â†’VARINT, f2â†’LEN_STRING  (sig: [(1,opt),(2,opt)])
# TypeB: f1â†’LEN_STRING, f2â†’VARINT  (sig: [(1,opt),(2,opt)])
# TypeC: f1â†’VARINT, f2â†’LEN_STRING  (sig: same as TypeA)
# TypeD: f1â†’LEN_STRING, f2â†’VARINT  (sig: same as TypeB)
#
# TypeA and TypeC are identical â†’ should collapse to same state.
# TypeB and TypeD are identical â†’ should collapse to same state.
# Root1.f1 and Root2.f1 both â†’ block(TypeA/C); same for f2 â†’ block(TypeB/D).
# So Root1 and Root2 SHOULD be bisimilar and collapse to the same state.
# This is the correct (non-buggy) case.
#
# Now add a twist: TypeA2 is identical to TypeA, but TypeB2 is DIFFERENT from TypeB.
# Root3 has f1â†’TypeA2, f2â†’TypeB2.
# Root3 must be in a DIFFERENT state from Root1/Root2.

messages:
  TypeA:
    kind: LENDEL
    fields:
      - number: 1
        kind: VARINT
      - number: 2
        kind: LEN_STRING

  TypeB:
    kind: LENDEL
    fields:
      - number: 1
        kind: LEN_STRING
      - number: 2
        kind: VARINT

  TypeC:
    kind: LENDEL
    fields:
      - number: 1
        kind: VARINT
      - number: 2
        kind: LEN_STRING

  TypeD:
    kind: LENDEL
    fields:
      - number: 1
        kind: LEN_STRING
      - number: 2
        kind: VARINT

  Root1:
    kind: LENDEL
    fields:
      - number: 1
        kind: MESSAGE
        child: TypeA
        label: repeated
      - number: 2
        kind: MESSAGE
        child: TypeB
        label: repeated

  Root2:
    kind: LENDEL
    fields:
      - number: 1
        kind: MESSAGE
        child: TypeC
        label: repeated
      - number: 2
        kind: MESSAGE
        child: TypeD
        label: repeated
