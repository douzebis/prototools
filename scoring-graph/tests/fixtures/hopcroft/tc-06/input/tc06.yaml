entries:
  - AnnotatedMapEntry
  - MultiOptionMapEntry
  - MapWithOptions

messages:
  AnnotatedMapEntry:
    kind: LENDEL
    fields:
      - number: 1
        type: string
      - number: 2
        type: uint64
  MultiOptionMapEntry:
    kind: LENDEL
    fields:
      - number: 1
        type: uint64
      - number: 2
        type: string
  MapWithOptions:
    kind: LENDEL
    fields:
      - number: 1
        type: message
        child: AnnotatedMapEntry
        label: repeated
      - number: 2
        type: message
        child: MultiOptionMapEntry
        label: repeated
