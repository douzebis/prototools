entries:
- Inner
- Outer
messages:
  Inner:
    fields:
    - number: 1
      type: uint64
  Outer:
    fields:
    - number: 1
      type: uint64
      label: required
    - number: 2
      type: string
    - number: 3
      type: uint64
      label: repeated
    - number: 4
      type: message
      child: Inner
    - number: 5
      type: enum
      range: [0, 2]
