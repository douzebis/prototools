[package]
name        = "prototext"
version     = "0.1.3"
edition     = "2021"
description = "Lossless protobuf ↔ enhanced-textproto converter"
license     = "MIT"
repository  = "https://github.com/douzebis/prototools"
readme      = "../README.md"
keywords    = ["protobuf", "proto", "textproto", "cli"]
categories  = ["command-line-utilities", "encoding"]

[package.metadata.docs.rs]
targets = []

[[bin]]
name = "prototext"
path = "src/main.rs"

[dependencies]
prototext-core = { path = "../prototext-core", version = "0.1.1" }
clap            = { version = "4.5", features = ["derive"] }
clap_complete   = { version = "4.5", features = ["unstable-dynamic"] }
globset         = "0.4"
prost           = "0.14"
prost-types     = "0.14"
walkdir         = "2"

[build-dependencies]
protox = "0.9"
prost  = "0.14"

[dev-dependencies]
toml = "0.8"
