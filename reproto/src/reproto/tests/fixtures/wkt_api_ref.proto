syntax = "proto3";

package test.wkt;

import "google/protobuf/api.proto";

// A message that references google.protobuf.Api so that the api.proto
// fallback is exercised by --use-variant all (regression for spec 0052).
message ServiceWrapper {
  google.protobuf.Api api = 1;
}
