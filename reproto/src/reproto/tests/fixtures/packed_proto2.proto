//
// Fixture: packed_proto2.proto
// Tests: packed encoding option rendering in proto2 (spec 0016):
//   - repeated numeric field with no packed option set (default: unpacked)
//   - repeated numeric field with [packed = true] explicitly set
//   - repeated numeric field with [packed = false] explicitly set
//   - repeated string/bytes fields (not packable — option irrelevant)
//   - repeated enum fields: default, explicit true, explicit false
//
// Key invariant: reproto mirrors the HasField("packed") state exactly.
// When packed is unset (default), nothing is emitted.  Only explicit
// true/false values are reproduced.
//
// Used in POLYGLOT_FIXTURES_STRICT: only the syntax field differs under
// --force-proto2-output.

syntax = "proto2";
package mockup;

enum Status {
  STATUS_UNKNOWN = 0;
  STATUS_OK = 1;
}

message Packed {
  repeated int32 default_int = 1;
  repeated int32 explicit_true = 2 [packed = true];
  repeated int32 explicit_false = 3 [packed = false];
  repeated string strings = 4;
  repeated bytes bytesf = 5;
  repeated Status enums_default = 6;
  repeated Status enums_true = 7 [packed = true];
  repeated Status enums_false = 8 [packed = false];
}
