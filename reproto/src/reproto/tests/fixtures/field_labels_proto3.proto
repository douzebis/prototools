//
// Fixture: field_labels_proto3.proto
// Tests: proto3 field label rendering (spec 0019):
//   - implicit singular scalar (no label keyword)
//   - explicit optional scalar (proto3_optional=true → `optional` keyword)
//   - repeated scalar
//   - implicit message field (no label keyword)
//   - explicit optional message field (`optional` keyword)
//   - oneof fields (no label inside oneof)
//
// Used in POLYGLOT_FIXTURES_LOSSY: the proto3_optional / synthetic-oneof
// descriptor fields cannot be reproduced from proto2 source, so the
// --force-proto2-output roundtrip only checks crash-safety.

syntax = "proto3";
package mockup;

message Inner {
  int32 val = 1;
}

message Labels {
  int32    implicit_scalar  = 1;
  optional int32  explicit_opt    = 2;
  repeated int32  rep_field       = 3;
  Inner    msg_field        = 4;
  optional Inner  opt_msg_field   = 5;

  oneof choice {
    int32  oneof_a = 10;
    string oneof_b = 11;
  }
}
