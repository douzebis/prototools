// Fixture: enum.proto
// Tests: all EnumDescriptorProto features in proto2:
//   - allow_alias, deprecated enum option, custom EnumOptions extension
//   - aliases (duplicate values), deprecated enum values
//   - reserved ranges, reserved individual numbers, reserved names
//   - negative and extreme int32 enum values
//   - enum with only a zero value (EmptyEnum)
//   - extend google.protobuf.EnumOptions (custom option definition)

syntax = "proto2";

package reproto;

import "google/protobuf/descriptor.proto";

// Full enum illustrating all constructs
enum AllEnumFeatures {
  // Allow duplicate numeric values
  option allow_alias = true;
  // Enum itself is deprecated
  option deprecated = true;
  // Custom extension option
  option (.reproto.example_enum_option) = "custom";

  // Explicit enum values
  VALUE_ZERO = 0;
  VALUE_ONE = 1;
  VALUE_TWO = 2;
  // Alias (allowed by allow_alias)
  VALUE_THREE = 2;

  // Mark deprecated value
  VALUE_DEPRECATED = 99 [deprecated = true];

  // Reserved numeric range
  reserved 100 to 199;
  // Reserved specific numbers
  reserved 300;
  reserved 301;
  // Reserved names
  reserved "OLD_VALUE";
  reserved "OBSOLETE";
}

// Another enum showing extensions usage
enum ExtendedEnum {
  option (.reproto.example_enum_option) = "extended";

  FIRST = 0;
  SECOND = 1;
}

// Enum demonstrating negative and large numbers
enum NumericVariants {
  MINUS_ONE = -1;
  MAX_INT32 = 2147483647;
  MIN_INT32 = -2147483648;
}

// Enum demonstrating empty/default name
enum EmptyEnum {
  UNSPECIFIED = 0;
}

// Enum with only reserved values
enum OnlyReserved {
  UNSPECIFIED2 = 0;
  reserved 1 to 10;
  reserved "RESERVED_NAME";
}

// Define an extension for enums (just for illustration)
extend google.protobuf.EnumOptions {
  optional string example_enum_option = 51234;
}
