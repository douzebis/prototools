// TC-4: no spurious summoning.
// Imports tc4_leaf.proto and uses Leaf, but is not seeded — must NOT be summoned.

syntax = "proto3";

package tc4;

import "tc4_leaf.proto";

message User {
  Leaf leaf = 1;
}
