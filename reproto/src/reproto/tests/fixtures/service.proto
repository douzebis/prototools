// Comprehensive test fixture for ServiceDescriptorProto and
// MethodDescriptorProto rendering.
//
// This fixture exercises all syntactic possibilities for services
// and methods in proto2 syntax:
// - Basic unary methods
// - Client streaming
// - Server streaming
// - Bidirectional streaming
// - Method options (deprecated, idempotency_level, features)
// - Service options (deprecated, features)
// - Multiple services
// - Multiple methods per service
// - Various input/output types

syntax = "proto2";

package test.service;

// Basic service with simple unary method
service BasicService {
  rpc SimpleRpc(Request) returns (Response);
}

// Service with all streaming variations
service StreamingService {
  rpc ClientStream(stream StreamRequest) returns (StreamResponse);
  rpc ServerStream(StreamRequest) returns (stream StreamResponse);
  rpc BidiStream(stream StreamRequest) returns (stream StreamResponse);
}

// Service with method options
service OptionsService {
  rpc DeprecatedMethod(Request) returns (Response) {
    option deprecated = true;
  }

  rpc IdempotentMethod(Request) returns (Response) {
    option idempotency_level = IDEMPOTENT;
  }

  rpc ReadOnlyMethod(Request) returns (Response) {
    option idempotency_level = NO_SIDE_EFFECTS;
  }
}

// Deprecated service
service DeprecatedService {
  option deprecated = true;

  rpc OldMethod(Request) returns (Response);
}

// Service with multiple methods of different types
service MixedService {
  rpc Unary(Request) returns (Response);
  rpc Upload(stream StreamRequest) returns (StreamResponse);
  rpc Download(StreamRequest) returns (stream StreamResponse);
  rpc Chat(stream Request) returns (stream Response);

  rpc LegacyStream(stream Request) returns (stream Response) {
    option deprecated = true;
  }
}

// Empty service (edge case)
service EmptyService {
}

// Basic message types for method signatures
message Request {
  optional string query = 1;
}

message Response {
  optional string result = 1;
}

message StreamRequest {
  optional int32 chunk_id = 1;
  optional bytes data = 2;
}

message StreamResponse {
  optional int32 chunk_id = 1;
  optional bytes data = 2;
  optional bool complete = 3;
}
