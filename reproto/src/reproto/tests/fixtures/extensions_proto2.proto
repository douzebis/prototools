//
// Fixture: extensions_proto2.proto
// Tests: proto2 extensions on user-defined messages (proto2-only feature):
//   - `extensions N to M;` declaration on a user-defined message
//   - file-level `extend UserMessage` block with multiple fields
//   - message-nested `extend UserMessage` block (inside Holder)
//
// Contrasts with custom_options_proto3.proto, which tests proto3-legal
// extend blocks targeting *Options messages.

syntax = "proto2";
package mockup;

message Extendable {
  optional string base = 1;
  extensions 100 to 199;
}

message Holder {
  extend Extendable {
    optional bool msg_ext = 102;
  }
  optional int32 own_field = 1;
}

extend Extendable {
  optional string file_ext = 100;
  optional int32 file_ext2 = 101;
}
