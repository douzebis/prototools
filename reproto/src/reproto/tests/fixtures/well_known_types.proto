// Test fixture for Google well-known types

syntax = "proto2";

package test.wellknown;

import "google/protobuf/any.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

service TestService {
  rpc GetEmpty(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc GetMessage(TestMessage) returns (TestMessage);
}

message TestMessage {
  optional google.protobuf.Any any_field = 1;
  optional google.protobuf.Empty empty_field = 2;
  optional google.protobuf.Timestamp timestamp_field = 3;
  optional google.protobuf.Duration duration_field = 4;
}
