//
// Fixture: well_known_types.proto
// Tests: reproto's handling of Google well-known type imports and references:
//   - imports of google/protobuf/any.proto, empty.proto, timestamp.proto,
//     duration.proto
//   - fields typed as google.protobuf.Any, Empty, Timestamp, Duration
//   - service using google.protobuf.Empty as RPC request/response type
//
// Well-known types are handled via reproto variants (--use-variant any/empty/
// timestamp/duration), which substitute stub definitions so protoc can
// recompile the output without the full Google protobuf source tree.

syntax = "proto2";

package test.wellknown;

import "google/protobuf/any.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

service TestService {
  rpc GetEmpty(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc GetMessage(TestMessage) returns (TestMessage);
}

message TestMessage {
  optional google.protobuf.Any any_field = 1;
  optional google.protobuf.Empty empty_field = 2;
  optional google.protobuf.Timestamp timestamp_field = 3;
  optional google.protobuf.Duration duration_field = 4;
}
