// Fixture: field_comprehensive.proto
// Tests: every FieldDescriptorProto feature in proto2:
//   - all scalar types (int32/64, uint32/64, sint32/64, fixed32/64,
//     sfixed32/64, float, double, bool, string, bytes)
//   - all labels: required, optional, repeated
//   - default values for every scalar type including inf/-inf/nan
//   - enum and message field types (required/optional/repeated)
//   - groups: optional group and repeated group (proto2-only construct)
//   - field options: packed=true/false, deprecated, combined options
//   - extension ranges and extend blocks on user-defined messages
//   - map fields: all key types, message and enum value types
//   - oneof blocks with scalars, messages, and enums
//   - deeply nested messages and cross-references to nested types
//   - edge cases: max field number, long field names

syntax = "proto2";

package test.field;

enum Status {
  UNKNOWN = 0;
  ACTIVE = 1;
  INACTIVE = 2;
}

message PrimitiveTypes {
  required int32 req_int32 = 1;
  optional int64 opt_int64 = 2;
  repeated uint32 rep_uint32 = 3;
  required uint64 req_uint64 = 4;
  optional sint32 opt_sint32 = 5;
  repeated sint64 rep_sint64 = 6;
  required fixed32 req_fixed32 = 7;
  optional fixed64 opt_fixed64 = 8;
  repeated sfixed32 rep_sfixed32 = 9;
  required sfixed64 req_sfixed64 = 10;
  optional float opt_float = 11;
  repeated double rep_double = 12;
  required bool req_bool = 13;
  optional string opt_string = 14;
  repeated bytes rep_bytes = 15;
}

message DefaultValues {
  optional int32 int32_default = 1 [default = 42];
  optional int64 int64_default = 2 [default = -123456789];
  optional uint32 uint32_default = 3 [default = 999];
  optional uint64 uint64_default = 4 [default = 18446744073709551615];
  optional sint32 sint32_default = 5 [default = -42];
  optional sint64 sint64_default = 6 [default = -999999];
  optional fixed32 fixed32_default = 7 [default = 100];
  optional fixed64 fixed64_default = 8 [default = 200];
  optional sfixed32 sfixed32_default = 9 [default = -100];
  optional sfixed64 sfixed64_default = 10 [default = -200];
  optional float float_default = 11 [default = 3.14];
  optional double double_default = 12 [default = 2.71828];
  optional float float_inf = 13 [default = inf];
  optional float float_neg_inf = 14 [default = -inf];
  optional double double_nan = 15 [default = nan];
  optional bool bool_default = 16 [default = true];
  optional string string_default = 17 [default = "hello world"];
  optional string string_empty = 18 [default = ""];
  optional string string_escaped = 19 [default = "line1\nline2\ttab"];
  optional bytes bytes_default = 20 [default = "binary\x00data"];
  optional bytes bytes_empty = 21 [default = ""];
}

message NestedMessage {
  optional int32 value = 1;
}

message ComplexTypes {
  required NestedMessage req_message = 1;
  optional NestedMessage opt_message = 2;
  repeated NestedMessage rep_message = 3;
  required Status req_enum = 4;
  optional Status opt_enum = 5 [default = ACTIVE];
  repeated Status rep_enum = 6;
}

message GroupTest {
  repeated group RepeatedGroup = 1 {
    required int32 group_field = 2;
  }

  optional group OptionalGroup = 3 {
    optional string name = 4;
    optional int32 id = 5;
  }
}

message FieldOptions {
  repeated int32 packed_ints = 1 [packed = true];
  repeated int64 unpacked_longs = 2 [packed = false];
  optional string deprecated_field = 3 [deprecated = true];
  repeated fixed32 packed_deprecated = 4 [
    packed = true,
    deprecated = true
  ];
  optional int32 default_and_deprecated = 5 [
    default = 100,
    deprecated = true
  ];
}

message Extendable {
  extensions 100 to 199;
}

message ExtensionFields {
  extend Extendable {
    optional int32 my_extension = 100;
    repeated string string_extension = 101;
    optional NestedMessage message_extension = 102;
  }
}

message MapFields {
  map<string, int32> string_to_int = 1;
  map<int32, string> int_to_string = 2;
  map<int64, bool> long_to_bool = 3;
  map<bool, float> bool_to_float = 4;
  map<string, NestedMessage> string_to_message = 5;
  map<int32, Status> int_to_enum = 6;
  map<int32, int32> int32_map = 10;
  map<int64, int32> int64_map = 11;
  map<uint32, int32> uint32_map = 12;
  map<uint64, int32> uint64_map = 13;
  map<sint32, int32> sint32_map = 14;
  map<sint64, int32> sint64_map = 15;
  map<fixed32, int32> fixed32_map = 16;
  map<fixed64, int32> fixed64_map = 17;
  map<sfixed32, int32> sfixed32_map = 18;
  map<sfixed64, int32> sfixed64_map = 19;
  map<bool, int32> bool_map = 20;
  map<string, int32> string_map = 21;
}

// Regression: map fields with options were silently dropped before the fix.
message MapWithOptions {
  map<string, int32> annotated_map = 1 [deprecated = true];
  map<int32, string> multi_option_map = 2 [
    packed = false,
    deprecated = true
  ];
}

message OneofFields {
  oneof test_oneof {
    int32 oneof_int = 1;
    string oneof_string = 2;
    NestedMessage oneof_message = 3;
    Status oneof_enum = 4;
  }
  oneof another_oneof {
    bool another_bool = 10;
    bytes another_bytes = 11;
  }
  optional int32 regular_field = 20;
}

// Fields come before nested types (protoc canonical order)
message Outer {
  optional Middle middle_field = 1;

  message Middle {
    optional Inner inner_field = 1;

    message Inner {
      optional int32 deep_value = 1;
    }
  }
}

message NestedReferences {
  optional Outer.Middle.Inner deeply_nested = 1;
  repeated Outer.Middle middle_repeated = 2;
}

message EdgeCases {
  optional int32 max_field_number = 536870911;
  optional int32 field_1 = 1;
  optional int32 field_100 = 100;
  optional int32 field_1000 = 1000;
  optional string this_is_a_very_long_field_name_that_tests_rendering = 2;
}

message AllCombinations {
  required int32 req_with_default = 1 [default = 0];
  optional NestedMessage opt_msg_deprecated = 2 [deprecated = true];
  repeated Status rep_enum_packed = 3 [packed = true];
  optional Status status_combo = 4 [
    default = INACTIVE,
    deprecated = true
  ];
}
