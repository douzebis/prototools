//
// Fixture: name_resolution.proto
// Tests: reproto's name-shortening logic, which must produce output that
//        protoc can recompile to a byte-identical descriptor.  Covers the
//        main quirks of protoc's name resolution:
//
//   TEST 1 — Enum value FQDN quirk: enum values live in the enclosing
//     package scope, not inside the enum type, so the default value of an
//     enum field is written as RESULT_OK, not Result.RESULT_OK.
//
//   TEST 2 — Nested type vs. nested extend block: a message-nested extend
//     block for google.protobuf.MessageOptions; the option reference must
//     use the fully-qualified form with leading dot.
//
//   TEST 3 — Collision scenarios: two messages both have an inner type
//     named Inner at different nesting levels; reproto must pick the
//     shortest unambiguous name for each reference.
//
//   TEST 4 — Extension scope resolution: a message-nested extend block
//     for google.protobuf.FieldOptions; the custom option is used in a
//     sibling message where the short name would be ambiguous, requiring
//     the fully-qualified form.
//
//   TEST 5 — C++ scoping (type name shortening): two types B exist at
//     different scopes; reproto shortens each reference to the minimal
//     unambiguous form.
//
//   TEST 6 — Extension in message literal scope: a MessageOptions extension
//     whose value is an empty message literal {}.

syntax = "proto2";

package name.resolution.test;

import "google/protobuf/descriptor.proto";

// ============================================================================
// TEST 1: Enum Value FQDN Quirk
// ============================================================================

enum StatusEnum {
  OK = 0;
  ERROR = 1;
}

enum Result {
  RESULT_OK = 0;
  RESULT_FAILED = 1;
}

message EnumTest {
  optional StatusEnum status = 1 [default = OK];
  optional Result result = 2 [default = RESULT_OK];
}

// ============================================================================
// TEST 2: Nested Type vs Nested Extension Quirk
// ============================================================================

message Outer {
  // extend blocks come before fields (protoc canonical order)
  extend google.protobuf.MessageOptions {
    optional string outer_ext = 50000;
  }

  message Inner {
    optional string value = 1;
  }

  message Test {
    option (.name.resolution.test.Outer.outer_ext) = "qualified";

    optional Inner inner = 1;
  }
}

// ============================================================================
// TEST 3: Collision Scenarios
// ============================================================================

message CollisionTest {
  message Inner {
    optional string value = 1;
  }

  message Container {
    // Fields come before nested types (protoc canonical order)
    optional CollisionTest.Inner outer_inner = 1;
    optional Inner container_inner = 2;

    message Inner {
      optional int32 number = 1;
    }
  }
}

// ============================================================================
// TEST 4: Extension Scope Resolution
// ============================================================================

message ExtensionScopeTest {
  // extend blocks come before fields (protoc canonical order)
  extend google.protobuf.FieldOptions {
    optional string nested_ext = 50002;
  }

  optional string field1 = 1 [(.name.resolution.test.package_ext) = "works"];

  message NestedMessage {
    // QUIRK: Custom option resolution skips current message scope
    // So nested_ext is NOT visible here without qualification
    optional string field2 = 1 [(.name.resolution.test.ExtensionScopeTest.nested_ext) = "works"];
  }
}

// ============================================================================
// TEST 5: Type Name C++ Scoping
// ============================================================================

message A {
  message B {
    optional string value = 1;
  }
}

message ScopingTest {
  // Fields come before nested types (protoc canonical order)
  // reproto shortens .name.resolution.test.A.B to A.B (safe: no collision)
  optional B local_b = 1;
  optional A.B other_b = 2;
  optional A.B absolute_b = 3;

  message B {
    optional int32 number = 1;
  }
}

// ============================================================================
// TEST 6: Extension in Message Literal Scope Resolution
// ============================================================================

message MessageLiteralTest {
  extend google.protobuf.MessageOptions {
    optional string msg_ext = 50003;
  }
}

message TestContainer {
  option (.name.resolution.test.embedded) = {};
}

extend google.protobuf.FieldOptions {
  optional string package_ext = 50001;
}
extend google.protobuf.MessageOptions {
  optional MessageLiteralTest embedded = 50004;
}
