//
// Fixture: synthetic_oneof.proto
// Tests: proto3 synthetic oneof suppression (spec 0019 §11):
//   - `optional int32` and `optional string` fields: protoc wraps each in
//     a synthetic oneof (name starts with `_`, single field, proto3_optional=true).
//     Reproto must suppress the synthetic oneof block and emit `optional T f`
//     directly.
//   - implicit singular scalar (no synthetic oneof, no label keyword)
//   - repeated field (no oneof involvement)
//   - real oneof block with two choices (must NOT be suppressed)
//
// Used in POLYGLOT_FIXTURES_LOSSY: the proto3_optional / synthetic-oneof
// descriptor fields cannot be reproduced from proto2 source.

syntax = "proto3";
package mockup;

message SyntheticOneof {
  optional int32  opt_scalar   = 1;
  optional string opt_string   = 2;
  int32           implicit     = 3;
  repeated int32  rep          = 4;

  oneof real_choice {
    int32  choice_a = 10;
    string choice_b = 11;
  }
}
