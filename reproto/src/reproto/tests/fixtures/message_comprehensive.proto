// Comprehensive test fixture for DescriptorProto (message) features
// Tests all syntactic possibilities for proto2 messages

syntax = "proto2";

package test.message;

// Base message for extension testing
message ExtendableMessage {
  extensions 100 to 199;
  extensions 500 to 599;
}

// Message with comprehensive field coverage
message ComprehensiveMessage {
  // extend blocks come before fields (protoc canonical order)
  extend ExtendableMessage {
    optional string extension_field1 = 100;
    repeated int32 extension_field2 = 101;
  }

  required int32 required_int32 = 1;
  optional int64 optional_int64 = 2;
  repeated uint32 repeated_uint32 = 3;
  optional sint32 sint32_field = 4;
  optional sint64 sint64_field = 5;
  optional fixed32 fixed32_field = 6;
  optional fixed64 fixed64_field = 7;
  optional sfixed32 sfixed32_field = 8;
  optional sfixed64 sfixed64_field = 9;
  optional bool bool_field = 10;
  optional string string_field = 11;
  optional bytes bytes_field = 12;
  optional float float_field = 13;
  optional double double_field = 14;
  optional NestedMessage nested_message_field = 20;
  optional NestedEnum nested_enum_field = 21;
  oneof test_oneof {
    string oneof_string = 30;
    int32 oneof_int = 31;
    NestedMessage oneof_message = 32;
  }
  map<string, int32> string_to_int_map = 40;
  map<int32, NestedMessage> int_to_message_map = 41;
  repeated group RepeatedGroup = 50 {
    optional int32 group_field = 51;
  }

  // Nested types come after fields (protoc canonical order)
  message NestedMessage {
    optional string nested_field = 1;

    message DeeplyNested {
      optional int32 deep_field = 1;
    }
  }

  enum NestedEnum {
    NESTED_UNKNOWN = 0;
    NESTED_FIRST = 1;
    NESTED_SECOND = 2;
  }

  reserved 60 to 69;
  reserved 80 to 89;
  reserved "old_field1", "old_field2", "deprecated_field";
}

// Message with only extensions
message OnlyExtensions {
  extend ExtendableMessage {
    optional OnlyExtensions extension_self = 500;
  }
}

// Message with multiple extension ranges
message MultipleExtensionRanges {
  extensions 1000 to 1999;
  extensions 2000 to 2999;
  extensions 3000 to max;
}

// Message with complex nesting
message OuterMessage {
  optional MiddleMessage middle = 1;

  message MiddleMessage {
    optional InnerMessage inner = 1;

    message InnerMessage {
      optional string deeply_nested_field = 1;
    }
  }
}

// Message with all oneof variations
message OneofVariations {
  oneof regular_oneof {
    int32 int_choice = 1;
    string string_choice = 2;
  }
  oneof message_oneof {
    ComprehensiveMessage.NestedMessage msg1 = 10;
    OuterMessage.MiddleMessage msg2 = 11;
  }
  oneof enum_oneof {
    ComprehensiveMessage.NestedEnum enum1 = 20;
  }
}

// Message with reserved only
message ReservedOnly {
  reserved 1 to 10;
  reserved 15;
  reserved 20 to 30;
  reserved "foo", "bar", "baz";
}

// Empty message
message EmptyMessage {
}

// Message with single field
message SingleFieldMessage {
  optional int32 only_field = 1;
}
