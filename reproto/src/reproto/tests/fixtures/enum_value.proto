//
// Fixture: enum_value.proto
// Tests: all EnumValueDescriptorProto option patterns in proto2:
//   - no options, deprecated only, custom extension only, both together
//   - multiple options on a single value (expanded bracket form)
//   - repeated extension options (value_tags applied twice)
//   - negative values with options
//   - alias values (allow_alias=true)
//   - extend google.protobuf.EnumValueOptions (string, int32, repeated string)

syntax = "proto2";

package reproto.test;

import "google/protobuf/descriptor.proto";

// Enum demonstrating various enum value option patterns
enum EnumValueOptionsTest {
  // Allow aliases for testing duplicate values
  option allow_alias = true;

  // Basic value with no options
  ZERO = 0;

  // Value with deprecated option
  ONE = 1 [deprecated = true];

  // Value with custom extension
  TWO = 2 [(.reproto.test.example_value_option) = "custom value"];

  // Value with multiple options
  THREE = 3 [
    deprecated = true,
    (.reproto.test.example_value_option) = "multi",
    (.reproto.test.value_number_option) = 42
  ];

  // Alias value (same number as TWO)
  ALIAS_TWO = 2;

  // Value with repeated extension option
  FOUR = 4 [
    (.reproto.test.value_tags) = "tag1",
    (.reproto.test.value_tags) = "tag2"
  ];

  // Value with all built-in and custom options
  COMPREHENSIVE = 5 [
    deprecated = true,
    (.reproto.test.example_value_option) = "comprehensive test",
    (.reproto.test.value_number_option) = 999,
    (.reproto.test.value_tags) = "alpha",
    (.reproto.test.value_tags) = "beta",
    (.reproto.test.value_tags) = "gamma"
  ];
}

// Enum with negative values and options
enum NegativeValuesWithOptions {
  NEG_ZERO = 0;
  NEG_ONE = -1 [deprecated = true];
  NEG_MAX = -2147483648 [(.reproto.test.example_value_option) = "min int32"];
}

// Enum with only deprecated values
enum AllDeprecated {
  OLD_VALUE_ZERO = 0 [deprecated = true];
  OLD_VALUE_ONE = 1 [deprecated = true];
  OLD_VALUE_TWO = 2 [deprecated = true];
}

// Enum with mixed options patterns
enum MixedOptions {
  // No options
  PLAIN = 0;

  // Only built-in option
  BUILTIN_ONLY = 1 [deprecated = true];

  // Only extension option
  EXTENSION_ONLY = 2 [(.reproto.test.example_value_option) = "ext"];

  // Both built-in and extension
  BOTH = 3 [
    deprecated = true,
    (.reproto.test.example_value_option) = "both"
  ];
}

// Define custom extension for enum value options
extend google.protobuf.EnumValueOptions {
  optional string example_value_option = 51235;
  optional int32 value_number_option = 51236;
  repeated string value_tags = 51237;
}
