//
// Fixture: packed_proto3.proto
// Tests: packed encoding option rendering in proto3 (spec 0016):
//   - repeated numeric field with no packed option (default: packed in proto3)
//   - repeated numeric field with [packed = true] explicitly set
//   - repeated numeric field with [packed = false] explicitly set
//   - repeated string/bytes fields (not packable)
//   - repeated enum fields: default, explicit true, explicit false
//   - repeated double and float with explicit true
//
// Key invariant: protoc does NOT set packed=true implicitly for proto3 fields —
// HasField("packed") remains False for default-packed proto3 fields.  For
// proto3→proto3 roundtrip reproto emits nothing (correct; spec 0015 §4).
// For proto3→proto2 (--force-proto2-output), reproto emits [packed=true]
// explicitly to preserve wire semantics (proto2 default is unpacked).
//
// Used in POLYGLOT_FIXTURES_STRICT: under --force-proto2-output, syntax and
// options.packed differ (implicit proto3 packed → explicit [packed=true]).

syntax = "proto3";
package mockup;

enum Status {
  STATUS_UNKNOWN = 0;
  STATUS_OK = 1;
}

message Packed {
  repeated int32 default_int = 1;
  repeated int32 explicit_true = 2 [packed = true];
  repeated int32 explicit_false = 3 [packed = false];
  repeated string strings = 4;
  repeated bytes bytesf = 5;
  repeated Status enums_default = 6;
  repeated Status enums_true = 7 [packed = true];
  repeated Status enums_false = 8 [packed = false];
  repeated double doubles_def = 9;
  repeated float floats_true = 10 [packed = true];
}
