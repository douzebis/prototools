name: Release

on:
  push:
    tags:
      - 'prototext-v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: prototext-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: prototext-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: prototext-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: prototext-macos-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi
      - name: Build
        run: cargo build -p prototext --release --target ${{ matrix.target }}
      - name: Rename artifact
        run: |
          cp target/${{ matrix.target }}/release/prototext ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            prototext-linux-x86_64/prototext-linux-x86_64
            prototext-linux-aarch64/prototext-linux-aarch64
            prototext-macos-x86_64/prototext-macos-x86_64
            prototext-macos-aarch64/prototext-macos-aarch64
