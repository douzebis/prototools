name: Nix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-15
          - os: macos-15-intel
            skip-clippy: true
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: "disabled"

      - name: Check formatting (rustfmt)
        run: nix-build -A rust-fmt

      - name: Check lints (clippy)
        if: ${{ !matrix.skip-clippy }}
        run: nix-build -A rust-clippy

      - name: Run tests
        run: nix-build -A rust-tests

      - name: Build prototools + prototext-codec + reproto
        run: nix-build -A prototools && nix-build -A prototext-codec && nix-build -A reproto

      - name: Run reproto tests + python lint
        run: nix-build -A reproto-tests && nix-build -A python-lint
