name: Nix

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    name: CI (${{ matrix.os }})
    if: github.repository == 'douzebis/prototools'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-15
          - os: macos-15-intel
            skip-clippy: true
            ci-target: ci-no-clippy
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-flakehub: "disabled"

      - name: Check formatting (rustfmt)
        run: nix-build -A rust-fmt

      - name: Check lints (clippy)
        if: ${{ !matrix.skip-clippy }}
        run: nix-build -A rust-clippy

      - name: Run CI targets (tests, build, reproto tests, python lint)
        run: nix-build -A ${{ matrix.ci-target || 'ci' }}

      - name: Build PyPI wheels
        if: github.ref == 'refs/heads/main'
        run: nix-build -A pypi

      - name: Upload PyPI wheels
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: pypi-${{ matrix.os }}
          path: result/

      - name: Build crates-io packages
        if: github.ref == 'refs/heads/main' && matrix.os == 'ubuntu-latest'
        run: nix-build -A crates-io

      - name: Upload crates-io packages
        if: github.ref == 'refs/heads/main' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: crates-io
          path: result/

  assemble:
    name: Assemble release artifact
    if: github.repository == 'douzebis/prototools' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Download all pypi artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pypi-*
          path: artifacts/

      - name: Download crates-io artifact
        uses: actions/download-artifact@v4
        with:
          name: crates-io
          path: artifacts/crates-io/

      - name: Assemble release/ directory and write publish.sh
        run: |
          mkdir -p release
          # Collect all wheels from all platforms
          find artifacts/ -name '*.whl' -exec cp {} release/ \;
          # Collect .crate files
          cp artifacts/crates-io/*.crate release/
          # Write the unified publish script
          cat > release/publish.sh <<'PUBLISH_EOF'
          #!/usr/bin/env bash
          # Usage: CARGO_REGISTRY_TOKEN=... TWINE_PASSWORD=... ./publish.sh
          set -euo pipefail
          DIR="$(cd "$(dirname "$0")" && pwd)"

          echo "=== Publishing to crates.io ==="
          cargo publish --crate-file "$DIR/prototext-graph-0.2.0.crate"
          sleep 15
          cargo publish --crate-file "$DIR/prototext-core-0.2.0.crate"
          sleep 15
          cargo publish --crate-file "$DIR/prototext-0.2.0.crate"

          echo "=== Publishing to PyPI ==="
          twine upload --username __token__ "$DIR"/*.whl
          PUBLISH_EOF
          chmod +x release/publish.sh

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release/
