name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.19.2

      - name: Install system dependencies
        run: sudo apt-get install -y mandoc

      # Note: prototext-gen-man is not built here — doing so requires a full
      # Nix+Crane build of the prototext crate (~10 min) just for one man page.
      # The prototext.1 man page is therefore omitted from the website.
      # See docs/specs/0102-prototext-args-crate.md for the dropped refactor
      # that would have made this fast.

      - name: Install Python dependencies for reproto
        run: pip install --quiet click google-re2 lark protobuf pyvis pyyaml rapidfuzz rich

      - name: Generate man pages
        run: |
          mkdir -p man/man1
          # prototext-gen-man omitted — see comment above.
          PYTHONPATH=reproto/src python3 -m reproto.gen_man man/man1
          PYTHONPATH=reproto/src python3 -m reproto.gen_man_instantiate man/man1
          PYTHONPATH=protoscan/src python3 -m protoscan.gen_man man/man1

      - name: Copy docs into website/content
        run: |
          set -e

          inject() {
            local src="$1" dst="$2"
            local title
            title=$(grep -m1 '^# ' "$src" | sed 's/^# //' || basename "$src" .md)
            printf '+++\ntitle = "%s"\n+++\n\n' "$title" > "$dst"
            cat "$src" >> "$dst"
          }

          # README → readme.md
          inject README.md website/content/readme.md

          # reproto/README.md → reproto-readme.md
          inject reproto/README.md website/content/reproto-readme.md

          # docs/*.md (workspace-wide docs) plus each app's own docs/<app>/*.md
          # (not specs/) — flattened into the same website/content/ namespace.
          for f in docs/*.md docs/prototext/*.md docs/reproto/*.md; do
            [ -f "$f" ] || continue
            name=$(basename "$f" .md | tr '[:upper:]' '[:lower:]' | tr '_' '-')
            inject "$f" "website/content/${name}.md"
          done

          # docs/specs/[0-9]*.md — publish only user-facing specs.
          #
          # Excluded categories:
          #   - draft / dropped / in-progress specs
          #   - pure internal test harnesses (0006, 0009, 0017, 0054, 0059)
          #   - reproto code-quality cleanup rounds (0031-0037)
          #   - Nix build internals (0038)
          #   - internal bug-fix specs with no standalone user value
          #     (0051, 0053, 0060, 0062)
          #   - bp-protodb companion (0043-hopcroft-db-bp-protodb)
          #
          EXCLUDE_SPECS="0006 0009 0014 0015 0017 0024 0031 0032 0033 \
                         0035 0036 0037 0038 0040 0042 0043 0044 0047 0050 \
                         0051 0053 0054 0059 0060 0061 0062"

          mkdir -p website/content/specs
          for f in docs/specs/[0-9]*.md; do
            [ -f "$f" ] || continue
            num=$(basename "$f" .md | grep -oE '^[0-9]+')
            skip=0
            for ex in $EXCLUDE_SPECS; do
              [ "$num" = "$ex" ] && skip=1 && break
            done
            # Also skip the bp-protodb companion (no number prefix match needed,
            # catch by filename).
            case "$(basename $f)" in
              0043-hopcroft-db-bp-protodb.md) skip=1 ;;
            esac
            [ "$skip" = "1" ] && continue
            name=$(basename "$f" .md)
            inject "$f" "website/content/specs/${name}.md"
          done

          # prototext man page — omitted (prototext.1 not generated here).
          # See docs/specs/0102-prototext-args-crate.md.

          # reproto man page → website/content/reproto-man-page.md
          {
            printf '+++\ntitle = "reproto Man Page"\n+++\n\n'
            printf '<div class="manpage">\n'
            mandoc -T html -O fragment man/man1/reproto.1 2>/dev/null \
              || cat man/man1/reproto.1
            printf '</div>\n'
          } > website/content/reproto-man-page.md

          # reproto-instantiate-schema man page
          {
            printf '+++\ntitle = "reproto-instantiate-schema Man Page"\n+++\n\n'
            printf '<div class="manpage">\n'
            mandoc -T html -O fragment man/man1/reproto-instantiate-schema.1 2>/dev/null \
              || cat man/man1/reproto-instantiate-schema.1
            printf '</div>\n'
          } > website/content/reproto-instantiate-schema-man-page.md

          # protoscan man page
          {
            printf '+++\ntitle = "protoscan Man Page"\n+++\n\n'
            printf '<div class="manpage">\n'
            mandoc -T html -O fragment man/man1/protoscan.1 2>/dev/null \
              || cat man/man1/protoscan.1
            printf '</div>\n'
          } > website/content/protoscan-man-page.md

      - name: Build
        run: cd website && zola build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
