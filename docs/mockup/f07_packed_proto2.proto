//
// Finding: packed option in proto2 descriptors.
// Verify HasField("packed") for: default (not set), packed=true, packed=false.
// Also verify for non-packable types (string, bytes, message).

syntax = "proto2";
package mockup;

message Packed {
  repeated int32  default_int    = 1;               // packed not set
  repeated int32  explicit_true  = 2 [packed = true];
  repeated int32  explicit_false = 3 [packed = false];
  repeated string strings        = 4;               // not packable
  repeated bytes  bytesf         = 5;               // not packable
  repeated Status enums_default  = 6;               // enum, packed not set
  repeated Status enums_true     = 7 [packed = true];
  repeated Status enums_false    = 8 [packed = false];
}

enum Status {
  STATUS_UNKNOWN = 0;
  STATUS_OK      = 1;
}
