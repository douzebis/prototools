//
// Finding: packed option in proto3 descriptors.
// Key question: does protoc strip explicit [packed=true] back to unset,
// or preserve it?

syntax = "proto3";
package mockup;

message Packed {
  repeated int32  default_int    = 1;               // packed not set (default=packed)
  repeated int32  explicit_true  = 2 [packed = true];
  repeated int32  explicit_false = 3 [packed = false];
  repeated string strings        = 4;               // not packable
  repeated bytes  bytesf         = 5;               // not packable
  repeated Status enums_default  = 6;               // enum, packed not set
  repeated Status enums_true     = 7 [packed = true];
  repeated Status enums_false    = 8 [packed = false];
  repeated double doubles_def    = 9;               // double, packed not set
  repeated float  floats_true    = 10 [packed = true];
}

enum Status {
  STATUS_UNKNOWN = 0;
  STATUS_OK      = 1;
}
