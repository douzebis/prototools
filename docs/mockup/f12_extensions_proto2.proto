//
// Finding: extensions in proto2.
// Verify: extension_range, extend blocks at file and message level.

syntax = "proto2";
package mockup;

message Extendable {
  optional string base = 1;
  extensions 100 to 199;
}

extend Extendable {
  optional string file_ext  = 100;
  optional int32  file_ext2 = 101;
}

message Holder {
  extend Extendable {
    optional bool msg_ext = 102;
  }
  optional int32 own_field = 1;
}
