//
// Finding: extension range options (verification, declaration).
// Verify: RETENTION_SOURCE means they don't survive into the descriptor.

syntax = "proto2";
package mockup;

message WithRangeOptions {
  optional int32 base = 1;
  extensions 100 to 199;
}
