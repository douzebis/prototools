# Stress-test type list (spec 0054).
#
# Each entry is either a bare FQDN string or a dict {fqdn: ..., max_ties: N}.
# max_ties (default 5): if --list-schemas returns more than max_ties tied
# FQDNs, the test fails with an error (scoring too weak for this corpus).
#
# Sorted lexicographically by FQDN.  No leading dot.
#
# Coverage:
#   - All fixture top-level message types (our own corpus), except editions-only
#     types (reproto.test.rendering.*) which are incompatible with inference after
#     the --prost-workaround features-stripping pass
#   - ~100 randomly sampled types from googleapis and opentelemetry-proto

